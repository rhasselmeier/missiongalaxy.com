<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Galaxy — Coming 2027</title>
<meta name="description" content="Mission Galaxy — a game in development. Launching 2027.">
<meta name="theme-color" content="#060b14">
<style>
  :root {
    /* Palette derived from mg-logo / mg-name SVGs */
    --space: #060b14;
    --space-deep: #03060d;
    --navy: #032145;           /* primary logo fill */
    --navy-deep: #011d40;      /* wordmark navy */
    --navy-mid: #2e4d73;       /* secondary lettering */
    --steel: #5f7ea7;          /* mid steel blue */
    --steel-bright: #88a4c4;   /* lighter steel accent */
    --nebula: #5877a1;         /* steel blue wash */
    --nebula-soft: rgba(88, 119, 161, 0.42);
    --cyan: #a8c4de;           /* soft sky highlight (logo light tones) */
    --cyan-soft: rgba(168, 196, 222, 0.32);
    --gold: #e29b28;           /* logo gold accent */
    --gold-soft: rgba(226, 155, 40, 0.28);
    --ink: #e6ecf3;            /* logo highlight gray-blue */
    --dim: #8fa3bc;
    --muted: #5a6f8c;
    --glass: rgba(6, 14, 28, 0.62);
    --glass-border: rgba(88, 119, 161, 0.28);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; }
  html { height: 100%; scroll-behavior: smooth; }
  body {
    min-height: 100%;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--space-deep);
    color: var(--ink);
    line-height: 1.65;
    overflow-x: hidden;
  }

  /* —— Scene: fixed multi-layer space —— */
  .scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .scene__base {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 100%, #0a1424 0%, transparent 55%),
      radial-gradient(ellipse 90% 70% at 15% 10%, rgba(20, 48, 84, 0.55) 0%, transparent 50%),
      radial-gradient(ellipse 70% 60% at 85% 25%, rgba(46, 77, 115, 0.35) 0%, transparent 45%),
      linear-gradient(180deg, #071018 0%, var(--space) 45%, #03060d 100%);
  }

  /* Parallax nebula washes */
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    will-change: transform;
    opacity: 0.75;
    mix-blend-mode: screen;
  }
  .nebula--a {
    width: min(70vw, 720px);
    height: min(70vw, 720px);
    top: -12%;
    left: -8%;
    background: radial-gradient(circle, rgba(88, 119, 161, 0.5) 0%, rgba(3, 33, 69, 0.35) 40%, transparent 70%);
    animation: nebula-drift-a 48s ease-in-out infinite alternate;
  }
  .nebula--b {
    width: min(55vw, 560px);
    height: min(55vw, 560px);
    bottom: 5%;
    right: -10%;
    background: radial-gradient(circle, rgba(46, 77, 115, 0.45) 0%, rgba(24, 48, 84, 0.2) 45%, transparent 70%);
    animation: nebula-drift-b 56s ease-in-out infinite alternate;
  }
  .nebula--c {
    width: min(40vw, 400px);
    height: min(40vw, 400px);
    top: 40%;
    left: 55%;
    background: radial-gradient(circle, rgba(226, 155, 40, 0.12) 0%, rgba(88, 119, 161, 0.18) 45%, transparent 65%);
    animation: nebula-drift-c 40s ease-in-out infinite alternate;
  }

  @keyframes nebula-drift-a {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(6%, 8%) scale(1.08); }
  }
  @keyframes nebula-drift-b {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-8%, -5%) scale(1.12); }
  }
  @keyframes nebula-drift-c {
    from { transform: translate(0, 0); }
    to   { transform: translate(-10%, 6%); }
  }

  /* Soft vignette + film grain feel */
  .scene__vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 75% 70% at 50% 45%, transparent 30%, rgba(3, 6, 13, 0.58) 100%),
      linear-gradient(180deg, rgba(3, 6, 13, 0.38) 0%, transparent 18%, transparent 75%, rgba(3, 6, 13, 0.68) 100%);
  }

  /* Star field layers */
  .stars {
    position: absolute;
    inset: 0;
  }
  .stars span {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
    animation: twinkle var(--dur, 4s) ease-in-out infinite alternate;
    animation-delay: var(--delay, 0s);
    opacity: var(--o, 0.6);
    width: var(--s, 2px);
    height: var(--s, 2px);
  }
  @keyframes twinkle {
    from { opacity: calc(var(--o, 0.6) * 0.25); transform: scale(0.85); }
    to   { opacity: var(--o, 0.6); transform: scale(1); }
  }

  /* Cosmic dust */
  .dust {
    position: absolute;
    inset: 0;
  }
  .dust i {
    position: absolute;
    width: 1.5px;
    height: 1.5px;
    border-radius: 50%;
    background: rgba(176, 193, 217, 0.55);
    animation: dust-float var(--d, 28s) linear infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }
  @keyframes dust-float {
    0%   { transform: translateY(8vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-110vh) translateX(12px); opacity: 0; }
  }

  /* Drifting exploratory imagery */
  .drift {
    position: absolute;
    will-change: transform;
    opacity: 0;
    animation: fade-in 2.4s var(--ease-out) forwards;
  }
  .drift img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    filter: saturate(0.85) brightness(0.75) contrast(1.05);
    mask-image: radial-gradient(circle, #000 35%, transparent 72%);
    -webkit-mask-image: radial-gradient(circle, #000 35%, transparent 72%);
  }
  .drift::after {
    content: "";
    position: absolute;
    inset: 8%;
    border-radius: 50%;
    box-shadow:
      0 0 40px rgba(88, 119, 161, 0.2),
      inset 0 0 60px rgba(3, 6, 13, 0.55);
    pointer-events: none;
  }
  .drift--1 {
    width: min(38vw, 420px);
    height: min(38vw, 420px);
    top: 8%;
    right: -4%;
    animation-delay: 0.3s;
    animation-name: fade-in, drift-1;
    animation-duration: 2.4s, 90s;
    animation-timing-function: var(--ease-out), ease-in-out;
    animation-iteration-count: 1, infinite;
    animation-direction: normal, alternate;
    animation-fill-mode: forwards, none;
  }
  .drift--2 {
    width: min(28vw, 300px);
    height: min(28vw, 300px);
    bottom: 12%;
    left: -3%;
    animation-delay: 0.7s;
    animation-name: fade-in, drift-2;
    animation-duration: 2.4s, 75s;
    animation-timing-function: var(--ease-out), ease-in-out;
    animation-iteration-count: 1, infinite;
    animation-direction: normal, alternate;
    animation-fill-mode: forwards, none;
  }
  .drift--3 {
    width: min(18vw, 200px);
    height: min(18vw, 200px);
    top: 55%;
    right: 18%;
    opacity: 0;
    animation-delay: 1.1s;
    animation-name: fade-in, drift-3;
    animation-duration: 2.4s, 60s;
    animation-timing-function: var(--ease-out), ease-in-out;
    animation-iteration-count: 1, infinite;
    animation-direction: normal, alternate;
    animation-fill-mode: forwards, none;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes drift-1 {
    from { transform: translate3d(0, 0, 0) rotate(0deg); }
    to   { transform: translate3d(-4%, 6%, 0) rotate(3deg); }
  }
  @keyframes drift-2 {
    from { transform: translate3d(0, 0, 0) rotate(0deg); }
    to   { transform: translate3d(5%, -4%, 0) rotate(-4deg); }
  }
  @keyframes drift-3 {
    from { transform: translate3d(0, 0, 0); }
    to   { transform: translate3d(-6%, -5%, 0); }
  }

  /* Parallax containers (mouse-driven) */
  .parallax-layer {
    position: absolute;
    inset: 0;
    transition: transform 0.6s var(--ease-out);
    will-change: transform;
  }

  /* —— App shell —— */
  .shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem clamp(1.25rem, 4vw, 2.5rem);
    animation: rise 1s var(--ease-out) both;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: inherit;
  }
  /* Solid light-grey panel with navy outline behind wordmark */
  .logo__mark {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0.4rem 0.65rem;
    border-radius: 10px;
    background: #e8eaed;
    border: 2px solid var(--navy);
  }
  .logo__mark img {
    display: block;
    width: 160px;
    height: 42px;
    object-fit: contain;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 0.45rem 0.9rem;
    border: 1px solid rgba(95, 126, 167, 0.3);
    border-radius: 999px;
    background: rgba(6, 14, 28, 0.55);
    backdrop-filter: blur(8px);
  }
  .status-pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold);
    animation: blink 2.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* Main */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem clamp(1.25rem, 4vw, 2.5rem) 3rem;
  }
  .hero {
    width: min(100%, 560px);
    text-align: center;
    animation: rise 1.15s 0.15s var(--ease-out) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .kicker {
    color: var(--steel-bright);
    font-size: 0.78rem;
    letter-spacing: 0.48em;
    text-transform: uppercase;
    margin-bottom: 1.15rem;
    text-indent: 0.48em;
  }
  /* White rectangular patch behind logo — exceeds logo via padding */
  .hero-logo-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    width: min(92vw, 340px);
    box-sizing: border-box;
    /* Frame larger than logo so mark sits inside */
    padding: clamp(14px, 5vw, 22px);
    background: transparent;
    border: 0;
  }
  /* Solid white rectangle + navy double-ring; always behind logo */
  .hero-patch {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: #ffffff;
    border: 5px solid var(--navy);
    border-radius: 4px;
    box-shadow:
      0 0 0 3px #ffffff,
      0 0 0 7px var(--navy),
      0 10px 28px rgba(0, 0, 0, 0.35);
  }
  h1.hero-title {
    position: relative;
    z-index: 1;
    margin: 0;
    width: 100%;
    font-size: 0;
    line-height: 0;
  }
  .hero-logo {
    position: relative;
    z-index: 1;
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }
  .year {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    border: 1px solid rgba(226, 155, 40, 0.45);
    color: var(--gold);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    font-size: 0.82rem;
    padding: 0.55rem 1.4rem 0.55rem 1.75rem;
    background: rgba(226, 155, 40, 0.06);
    box-shadow: 0 0 28px rgba(226, 155, 40, 0.1);
  }
  .year::before,
  .year::after {
    content: "";
    width: 18px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
    opacity: 0.65;
  }
  .year::after {
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .blurb {
    max-width: 440px;
    margin: 1.75rem auto 0;
    color: var(--dim);
    font-size: 1.02rem;
    font-weight: 400;
  }

  /* Form card */
  .card {
    margin: 2.25rem auto 0;
    max-width: 420px;
    padding: 1.5rem 1.35rem 1.25rem;
    border-radius: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.03) inset,
      0 24px 60px rgba(0, 0, 0, 0.35),
      0 0 80px rgba(46, 77, 115, 0.12);
  }
  form {
    display: grid;
    gap: 0.75rem;
  }
  .field-label {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }
  input {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1px solid rgba(46, 77, 115, 0.75);
    border-radius: 8px;
    background: rgba(3, 10, 22, 0.7);
    color: var(--ink);
    font: inherit;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  input::placeholder { color: var(--muted); }
  input:focus {
    outline: none;
    border-color: rgba(88, 119, 161, 0.85);
    box-shadow: 0 0 0 3px rgba(88, 119, 161, 0.22);
  }
  button {
    background: linear-gradient(105deg, var(--navy-mid) 0%, var(--steel) 45%, var(--gold) 100%);
    background-size: 160% 100%;
    color: #03060d;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.9rem 1rem;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    font: inherit;
    font-size: 0.85rem;
    transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 28px rgba(46, 77, 115, 0.4);
  }
  button:hover {
    background-position: 100% 0;
    box-shadow: 0 10px 36px rgba(226, 155, 40, 0.28);
  }
  button:active { transform: translateY(1px); }
  button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
  #form-status {
    font-size: 0.88rem;
    color: var(--steel-bright);
    min-height: 1.3em;
  }
  .fineprint {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }
  .fineprint a {
    color: var(--dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .fineprint a:hover {
    color: var(--ink);
    border-bottom-color: rgba(230, 236, 243, 0.35);
  }

  footer {
    text-align: center;
    padding: 1.25rem 1.5rem 1.75rem;
    font-size: 0.76rem;
    color: var(--muted);
    animation: rise 1.2s 0.35s var(--ease-out) both;
  }
  footer a {
    color: var(--dim);
    text-decoration: none;
  }
  footer a:hover { color: var(--ink); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .nebula,
    .stars span,
    .dust i,
    .drift,
    .status-pill::before {
      animation: none !important;
    }
    .drift { opacity: 0.85; }
    .parallax-layer { transition: none; }
    .site-header, .hero, footer { animation: none; opacity: 1; transform: none; }
  }

  @media (max-width: 640px) {
    .logo__mark {
      padding: 0.32rem 0.5rem;
    }
    .logo__mark img {
      width: 120px;
      height: 32px;
    }
    .status-pill span { display: none; }
    .status-pill { padding: 0.45rem 0.65rem; }
    .status-pill::after {
      content: "In dev";
      letter-spacing: 0.15em;
    }
    .hero-logo-wrap {
      width: min(90vw, 280px);
      padding: clamp(12px, 4.5vw, 18px);
    }
    .drift--3 { display: none; }
    .card { padding: 1.25rem 1rem 1.1rem; }
    .year::before, .year::after { width: 10px; }
  }
</style>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<body>
  <!-- Background scene -->
  <div class="scene" aria-hidden="true">
    <div class="scene__base"></div>

    <div class="parallax-layer" data-depth="0.02">
      <div class="nebula nebula--a"></div>
      <div class="nebula nebula--b"></div>
      <div class="nebula nebula--c"></div>
    </div>

    <div class="parallax-layer" data-depth="0.04">
      <div class="stars" id="stars-far"></div>
    </div>

    <div class="parallax-layer" data-depth="0.08">
      <!-- Free NASA / Unsplash exploratory imagery (publicly licensed placeholders) -->
      <div class="drift drift--1">
        <img
          src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=800&q=70"
          alt=""
          width="420"
          height="420"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="drift drift--2">
        <img
          src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=600&q=70"
          alt=""
          width="300"
          height="300"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="drift drift--3">
        <img
          src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=400&q=70"
          alt=""
          width="200"
          height="200"
          loading="lazy"
          decoding="async"
        >
      </div>
    </div>

    <div class="parallax-layer" data-depth="0.12">
      <div class="stars" id="stars-near"></div>
      <div class="dust" id="dust"></div>
    </div>

    <div class="scene__vignette"></div>
  </div>

  <div class="shell">
    <header class="site-header">
      <a class="logo" href="/" aria-label="Mission Galaxy home">
        <span class="logo__mark">
          <img src="images/mg-name.svg" alt="Mission Galaxy" width="160" height="42">
        </span>
      </a>
      <div class="status-pill" title="Development status">
        <span>In development</span>
      </div>

    <main>
      <div class="hero">
        <p class="kicker">A game in development</p>
        <div class="hero-logo-wrap">
          <span class="hero-patch" aria-hidden="true"></span>
          <h1 class="hero-title">
            <img src="images/mg-logo.svg" alt="Mission Galaxy" class="hero-logo" width="300" height="300">

            <button type="submit">Notify Me</button>
            <div id="form-status" role="status" aria-live="polite"></div>

    <footer>
      &copy; 2026 Mission Galaxy &middot; <a href="/privacy.html">Privacy</a> &middot; <a href="/terms.html">Terms</a>
    </footer>

<script>
(function () {
  "use strict";

  /* Star fields */
  function seedStars(container, count, near) {
    if (!container) return;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const s = document.createElement("span");
      const size = near
        ? (1.2 + Math.random() * 2.2).toFixed(1) + "px"
        : (0.6 + Math.random() * 1.4).toFixed(1) + "px";
      s.style.setProperty("--s", size);
      s.style.setProperty("--o", (near ? 0.45 + Math.random() * 0.5 : 0.2 + Math.random() * 0.45).toFixed(2));
      s.style.setProperty("--dur", (2.5 + Math.random() * 4).toFixed(1) + "s");
      s.style.setProperty("--delay", (Math.random() * 5).toFixed(2) + "s");
      s.style.left = (Math.random() * 100).toFixed(2) + "%";
      s.style.top = (Math.random() * 100).toFixed(2) + "%";
      frag.appendChild(s);
    }
    container.appendChild(frag);
  }

  seedStars(document.getElementById("stars-far"), 70, false);
  seedStars(document.getElementById("stars-near"), 45, true);

  /* Dust particles */
  const dust = document.getElementById("dust");
  if (dust) {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 28; i++) {
      const p = document.createElement("i");
      p.style.left = (Math.random() * 100).toFixed(2) + "%";
      p.style.top = (Math.random() * 100).toFixed(2) + "%";
      p.style.setProperty("--d", (22 + Math.random() * 28).toFixed(1) + "s");
      p.style.setProperty("--delay", (-Math.random() * 30).toFixed(1) + "s");
      frag.appendChild(p);
    }
    dust.appendChild(frag);
  }

  /* Gentle mouse parallax (desktop) */
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const layers = document.querySelectorAll(".parallax-layer");
  if (!reduceMotion && layers.length && window.matchMedia("(pointer: fine)").matches) {
    let raf = 0;
    let targetX = 0;
    let targetY = 0;
    let curX = 0;
    let curY = 0;

    window.addEventListener("mousemove", function (e) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      targetX = (e.clientX - cx) / cx;
      targetY = (e.clientY - cy) / cy;
      if (!raf) raf = requestAnimationFrame(tick);
    }, { passive: true });

    function tick() {
      curX += (targetX - curX) * 0.06;
      curY += (targetY - curY) * 0.06;
      layers.forEach(function (layer) {
        const d = parseFloat(layer.getAttribute("data-depth") || "0.05");
        const x = curX * d * 48;
        const y = curY * d * 36;
        layer.style.transform = "translate3d(" + x.toFixed(2) + "px," + y.toFixed(2) + "px,0)";
      });
      if (Math.abs(targetX - curX) > 0.001 || Math.abs(targetY - curY) > 0.001) {
        raf = requestAnimationFrame(tick);
      } else {
        raf = 0;
      }
    }
  }

  /* Email form — preserved endpoint & payload shape */
  const ENDPOINT = "https://agii-vapi-bridge-9383.twil.io/web-contact";
  const form = document.getElementById("contact-form");
  if (form) {
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      const status = document.getElementById("form-status");
      const emailInput = form.email;
      if (!emailInput.checkValidity()) {
        emailInput.reportValidity();
        return;
      }
      const data = {
        name: "(launch list)",
        email: emailInput.value,
        message: "Mission Galaxy launch notify",
        business: "MG",
        source: "missiongalaxy.com",
        request_type: "Launch notify",
        website: form.website.value,
        "cf-turnstile-response": form.querySelector('[name="cf-turnstile-response"]')?.value || ""
      };
      if (ENDPOINT.startsWith("PENDING")) {
        status.textContent = "Sign-ups open shortly — check back soon.";
        return;
      }
      status.textContent = "Transmitting…";
      try {
        const r = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error("bad status");
        form.reset();
        status.textContent = "Locked in. See you at launch.";
      } catch {
        status.textContent = "Transmission failed — please try again later.";
      }
    });
  }
})();
</script>
</body>
</html>
